[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# URL normalization: Astro trailingSlash:'always' generates /page/index.html,
# Netlify Pretty URLs rewrites /page → /page/ automatically.
# NO Edge Function needed — Edge Functions caused 21-day redirect loops (ki-automatisieren Hard Rule).
[build.processing.html]
  pretty_urls = true
